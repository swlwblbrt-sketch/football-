<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Футбольные прогнозы</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
      text-align:center;
    }

    header{
      background:#16a34a;
      padding:20px;
      font-size:28px;
      font-weight:bold;
    }

    .card{
      background:#1e293b;
      margin:20px;
      padding:20px;
      border-radius:15px;
      box-shadow:0 0 10px rgba(0,0,0,0.5);
    }

    .team{
      font-size:24px;
      margin:10px 0;
    }

    .prediction{
      color:#22c55e;
      font-size:22px;
      font-weight:bold;
    }

    footer{
      margin-top:40px;
      padding:20px;
      background:#111827;
      color:#9ca3af;
    }
  </style>
</head>

<body>

<header>
⚽ Футбольные прогнозы
</header>

<div class="card">
  <div class="team">Ajax vs PSV</div>
  <div class="prediction">Прогноз: Победа Ajax</div>
</div>

<div class="card">
  <div class="team">Inter vs Bologna</div>
  <div class="prediction">Прогноз: Победа Inter</div>
</div>

<div class="card">
  <div class="team">Chelsea vs Tottenham</div>
  <div class="prediction">Прогноз: Обе забьют</div>
</div>

<footer>
Сайт создан Альбертом Шауловым
</footer>

</body>
</html>
